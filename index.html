<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prelu — Portfólio de Sites</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pp:#7C3AED;--pp-l:#9D5FF5;
  --dark:#0A0A0A;--gray:#1A1A1A;--muted:#6B7280;--white:#FAFAFA;
}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--dark);color:var(--white);overflow-x:hidden}
img{max-width:100%;display:block}

/* ── NAV ── */
.pnav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;height:64px;
  background:rgba(10,10,10,0.93);backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(124,58,237,0.15);
  gap:12px;
}
.pnav-logo{font-size:21px;font-weight:700;letter-spacing:-.5px;color:var(--white);flex-shrink:0}
.pnav-logo span{color:var(--pp)}
.pnav-tabs{display:flex;gap:2px;flex:1;justify-content:center;overflow:hidden}
.pnav-tab{
  padding:7px 13px;border-radius:7px;font-size:12.5px;font-weight:500;
  cursor:pointer;transition:all .18s;border:1px solid transparent;background:transparent;
  color:var(--muted);white-space:nowrap;font-family:'Space Grotesk',sans-serif;
}
.pnav-tab:hover{color:var(--white);background:rgba(255,255,255,.06)}
.pnav-tab.active{color:var(--white);background:rgba(124,58,237,.22);border-color:rgba(124,58,237,.38)}
.pnav-wa{
  display:flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:8px;background:#25D366;
  color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;
  transition:all .2s;white-space:nowrap;flex-shrink:0;text-decoration:none;
  font-family:'Space Grotesk',sans-serif;
}
.pnav-wa:hover{background:#20BD5A;transform:translateY(-1px)}
.wa-svg{width:16px;height:16px;fill:#fff;flex-shrink:0}

/* hamburger */
.pnav-burger{
  display:none;flex-direction:column;gap:5px;cursor:pointer;
  padding:6px;border:none;background:transparent;flex-shrink:0;
}
.pnav-burger span{display:block;width:22px;height:2px;background:var(--white);border-radius:2px;transition:all .28s}

/* mobile menu */
.mob-menu{
  display:none;position:fixed;top:64px;left:0;right:0;z-index:999;
  background:rgba(10,10,10,.97);backdrop-filter:blur(28px);
  border-bottom:1px solid rgba(124,58,237,.15);
  flex-direction:column;padding:12px 16px 20px;gap:4px;
}
.mob-menu.open{display:flex}
.mob-tab{
  padding:13px 16px;border-radius:8px;font-size:14px;font-weight:500;
  cursor:pointer;transition:all .18s;border:none;background:transparent;
  color:var(--muted);text-align:left;font-family:'Space Grotesk',sans-serif;
}
.mob-tab:hover{color:var(--white);background:rgba(255,255,255,.06)}
.mob-tab.active{color:var(--white);background:rgba(124,58,237,.2)}
.mob-wa{
  margin-top:10px;padding:15px;border-radius:10px;background:#25D366;
  color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;
  text-align:center;font-family:'Space Grotesk',sans-serif;text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:8px;
}

/* floating WA button */
.wa-float{
  position:fixed;bottom:28px;right:28px;z-index:998;
  width:56px;height:56px;border-radius:50%;background:#25D366;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(37,211,102,.45);
  cursor:pointer;transition:all .22s;text-decoration:none;
  border:none;
}
.wa-float:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(37,211,102,.6)}
.wa-float svg{width:28px;height:28px;fill:#fff}
.wa-float-tooltip{
  position:absolute;right:66px;top:50%;transform:translateY(-50%);
  background:rgba(10,10,10,.92);color:#fff;font-size:12px;font-weight:600;
  padding:6px 12px;border-radius:8px;white-space:nowrap;
  font-family:'Space Grotesk',sans-serif;letter-spacing:.3px;
  pointer-events:none;opacity:0;transition:opacity .2s;
  border:1px solid rgba(255,255,255,.1);
}
.wa-float:hover .wa-float-tooltip{opacity:1}

/* prelu badge */
.prelu-badge{
  position:fixed;bottom:28px;left:28px;z-index:998;
  display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:100px;
  background:rgba(10,10,10,.9);border:1px solid rgba(124,58,237,.35);
  backdrop-filter:blur(20px);cursor:pointer;transition:all .2s;
  font-size:11px;font-weight:600;color:var(--white);text-decoration:none;letter-spacing:.3px;
}
.prelu-badge:hover{border-color:var(--pp);background:rgba(124,58,237,.15)}
.prelu-dot{width:7px;height:7px;border-radius:50%;background:var(--pp);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* frame */
.site-frame{padding-top:64px;min-height:100vh;overflow-x:hidden}

/* hero */
.hero{position:relative;overflow:hidden;display:flex;align-items:center;min-height:92vh}
.hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.hero-ov{position:absolute;inset:0;z-index:1}
.hero-ct{position:relative;z-index:2;padding:60px 80px;max-width:800px}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:5px 13px;border-radius:100px;font-size:11px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:26px;
}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.hero h1{font-size:clamp(40px,5.5vw,78px);font-weight:700;line-height:1.02;letter-spacing:-2px;margin-bottom:22px}
.hero p{font-size:16px;line-height:1.78;margin-bottom:36px;max-width:480px}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.btn-p{
  display:inline-flex;align-items:center;gap:9px;
  padding:15px 28px;border-radius:10px;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .22s;border:none;letter-spacing:.2px;
  text-decoration:none;font-family:'Space Grotesk',sans-serif;
}
.btn-p:hover{filter:brightness(1.1);transform:translateY(-2px)}
.btn-s{
  display:inline-flex;align-items:center;gap:9px;
  padding:15px 28px;border-radius:10px;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .22s;background:transparent;letter-spacing:.2px;
  text-decoration:none;font-family:'Space Grotesk',sans-serif;
}
.btn-s:hover{background:rgba(255,255,255,.08);transform:translateY(-2px)}

/* sections */
.sec{padding:88px 80px}
.sec-sm{padding:52px 80px}
.lbl{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:14px}
.ttl{font-size:clamp(26px,3.2vw,48px);font-weight:700;letter-spacing:-1.5px;line-height:1.08;margin-bottom:14px}
.inner{max-width:1200px;margin:0 auto}

/* cards */
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:20px;margin-top:48px}
.card{border-radius:14px;overflow:hidden;cursor:default;transition:transform .25s,box-shadow .25s}
.card:hover{transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,.4)}

/* services grid */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1px;margin-top:48px;background:rgba(255,255,255,.06);border-radius:14px;overflow:hidden}
.si{padding:32px 26px;transition:background .2s;cursor:default}
.si-ic{font-size:24px;margin-bottom:14px}
.si-nm{font-size:15px;font-weight:600;margin-bottom:7px}
.si-ds{font-size:13px;line-height:1.62;opacity:.58}

/* feature row */
.fr{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;margin-top:48px}
.fr-img{width:100%;border-radius:18px;object-fit:cover;display:block}
.checks{display:flex;flex-direction:column;gap:12px;margin-top:24px}
.chk{display:flex;align-items:flex-start;gap:11px;font-size:14px;line-height:1.65}
.chk-ic{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:2px}

/* before/after */
.ba-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;margin-top:48px}
.ba-card{border-radius:16px;overflow:hidden;background:#fff;border:1px solid #E8ECF0}
.ba-imgs{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.ba-img-wrap{position:relative;overflow:hidden}
.ba-img-wrap img{width:100%;height:220px;object-fit:cover;object-position:center top;display:block;transition:transform .4s}
.ba-img-wrap:hover img{transform:scale(1.04)}
.ba-label{position:absolute;bottom:8px;left:8px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.ba-body{padding:18px 20px}
.ba-title{font-size:15px;font-weight:700;color:#0D1B2A;margin-bottom:4px}
.ba-sub{font-size:12px;color:#6B7280}

/* testimonials */
.tg{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:48px}
.tc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:28px}
.stars{color:#F59E0B;font-size:13px;margin-bottom:14px;letter-spacing:2px}
.tq{font-size:14px;line-height:1.78;opacity:.82;margin-bottom:22px}
.ta{display:flex;align-items:center;gap:11px}
.tav{width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0}
.tn{font-size:14px;font-weight:600}
.tr{font-size:12px;opacity:.5;margin-top:2px}

/* process */
.ps{display:flex;gap:0;margin-top:48px}
.pst{flex:1;padding:0 22px;position:relative}
.pst:not(:last-child)::after{content:'';position:absolute;right:0;top:22px;width:1px;height:55%;background:rgba(255,255,255,.08)}
.psn{font-size:36px;font-weight:700;letter-spacing:-2px;opacity:.12;margin-bottom:10px}
.psnm{font-size:14px;font-weight:600;margin-bottom:7px}
.psd{font-size:12px;line-height:1.65;opacity:.52}

/* faq */
.faq-list{margin-top:40px;display:flex;flex-direction:column;gap:2px}
.faq-q{padding:18px 22px;font-size:14px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:14px;border-radius:10px}
.faq-a{padding:0 22px 18px;font-size:13px;line-height:1.78;opacity:.62}

/* stats */
.stats{display:flex;gap:48px;flex-wrap:wrap}
.sn{font-size:40px;font-weight:700;letter-spacing:-2px;line-height:1}
.sl{font-size:12px;margin-top:4px;opacity:.55}

/* footer */
.ft{padding:36px 80px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.ft-logo{font-size:17px;font-weight:700;letter-spacing:-.4px}
.ft-links{display:flex;gap:22px;flex-wrap:wrap}
.ft-link{font-size:12px;opacity:.42;cursor:pointer;transition:opacity .18s}
.ft-link:hover{opacity:1}

/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .65s ease forwards}
.d1{animation-delay:.1s;opacity:0}.d2{animation-delay:.22s;opacity:0}
.d3{animation-delay:.36s;opacity:0}.d4{animation-delay:.5s;opacity:0}

/* ── LAYOUT HELPERS (usados via className) ── */
.gal-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:40px}
.gal-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:40px}
.proj-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.calc-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:36px}
.proj-main{display:grid;grid-template-columns:1fr 220px;gap:20px;margin-top:40px;align-items:start}
.proj-thumbs{display:flex;flex-direction:column;gap:8px}
.stats-bar{display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px}
.arq-filters{display:flex;gap:6px;flex-wrap:wrap}
.odonto-tabs{display:flex;gap:4px;margin-top:28px;border-bottom:2px solid #E8ECF0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.odonto-tabs::-webkit-scrollbar{display:none}

/* ── RESPONSIVE ── */
@media(max-width:960px){
  .pnav{padding:0 20px;height:60px}
  .pnav-tabs{display:none}
  .pnav-wa{display:none}
  .pnav-burger{display:flex}
  .mob-menu{top:60px}
  .site-frame{padding-top:60px}
  .hero-ct{padding:40px 20px 60px}
  .sec{padding:52px 20px}
  .sec-sm{padding:32px 20px}
  .ft{padding:28px 20px;flex-direction:column;align-items:flex-start;gap:18px}
  .fr{grid-template-columns:1fr;gap:28px}
  .ps{flex-direction:column;gap:24px}
  .pst::after{display:none}
  .stats{gap:24px}
  .ba-grid{grid-template-columns:1fr}
  .ba-img-wrap img{height:160px}
  .wa-float{bottom:16px;right:16px;width:52px;height:52px}
  .prelu-badge{display:none}
  /* grids */
  .gal-3{grid-template-columns:1fr 1fr;gap:10px}
  .gal-4{grid-template-columns:1fr 1fr;gap:10px}
  .proj-3{grid-template-columns:1fr 1fr;gap:10px}
  .calc-cards{grid-template-columns:1fr;gap:10px;margin-bottom:28px}
  /* marcenaria portfolio */
  .proj-main{grid-template-columns:1fr}
  .proj-thumbs{flex-direction:row;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;gap:8px;scrollbar-width:none}
  .proj-thumbs::-webkit-scrollbar{display:none}
  .proj-thumb-item{min-width:130px;flex-shrink:0}
  /* stats bars */
  .stats-bar{justify-content:flex-start;gap:20px}
}
@media(max-width:600px){
  .hero h1{font-size:34px;letter-spacing:-1px}
  .hero p{font-size:15px}
  .btn-row{flex-direction:column;align-items:stretch}
  .btn-p,.btn-s{justify-content:center;width:100%}
  .cg{grid-template-columns:1fr}
  .sg{grid-template-columns:1fr}
  .tg{grid-template-columns:1fr}
  .ttl{font-size:24px;letter-spacing:-0.8px}
  .sn{font-size:28px}
  .gal-3{grid-template-columns:1fr 1fr}
  .gal-4{grid-template-columns:1fr 1fr}
  .proj-3{grid-template-columns:1fr}
  .ba-imgs{grid-template-columns:1fr 1fr}
  .calc-cards{grid-template-columns:1fr 1fr}
  .calc-val{font-size:18px !important}
  .arq-filters{gap:4px}
  .arq-filters button{font-size:10px !important;padding:6px 10px !important}
}
</style>
</head>

<div id="root"></div>
